name: Atualizar Lista IPTV

on:
  schedule:
    # Roda automaticamente todos os dias às 06:00 e às 18:00 UTC (Ajuste se quiser)
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Permite que você rode o script manualmente pelo botão no GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Configura o ambiente Python na máquina virtual
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala as bibliotecas que o seu script precisa
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install feedparser beautifulsoup4 requests

    # 4. Executa o seu script de raspagem
    - name: Executar Script de Extração
      run: python script.py

    # 5. Salva a nova lista gerada de volta no seu GitHub
    - name: Commitar e dar Push na Lista Atualizada
      run: |
        git config --local user.email "104462712+JulioCesarXY@users.noreply.github.com"
        git config --local user.name "JulioCesarXY"
        git add lista_canais_com_logos.m3u
        
        # Só faz o commit se houver mudanças reais na lista para evitar commits vazios
        git diff --quiet && git diff --staged --quiet || (git commit -m "Lista atualizada automaticamente via GitHub Actions" && git push)
        
